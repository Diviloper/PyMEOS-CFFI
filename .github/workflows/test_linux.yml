name: Test PyMEOS CFFI on Linux

on:
  push:
    branches: [ "master", "stable-[0-9]+.[0-9]+" ]
  pull_request:
    branches: [ "master", "stable-[0-9]+.[0-9]+" ]

jobs:
  checks:
    name: Make checks
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.get_branch.outputs.branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch name
        id: get_branch
        run: |
          raw=$(git branch -r --contains ${{ github.ref }})
          branch=${raw##*/}
          echo "branch=$branch" >> $GITHUB_OUTPUT
          echo "Branch is $branch."

  test:
    name: Test PyMEOS CFFI on Python ${{ matrix.python-version }}
    needs: checks
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.8", "3.9", "3.10", "3.11", "3.12", "3.13" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MEOS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-14 libproj-dev libjson-c-dev libgeos-dev libgsl-dev

      - name: Install MEOS
        run: |
          git clone --depth 1 --branch ${{ needs.checks.outputs.branch }} https://github.com/MobilityDB/MobilityDB
          mkdir MobilityDB/build
          cd MobilityDB/build
          cmake .. -DMEOS=on
          make -j
          sudo make install

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install PyMEOS-CFFI
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run PyMEOS-CFFI check
        run: |
          python -c "import pymeos_cffi; print(pymeos_cffi.__version__);"
          python -c "from pymeos_cffi import *; meos_initialize(None); print(tpoint_out(tgeompoint_in('POINT(2 3)@2000-01-01'), 3)); meos_finalize();"